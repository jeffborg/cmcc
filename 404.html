<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found — Cessnock Motor Cycle Club</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="/assets/styles.css">
    <style>
      .not-found {
        background: var(--bg);
        color: #fff;
        min-height: 60vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 3rem 1rem;
      }
      .not-found-image {
        width: 100%;
        max-width: 52rem;
        border-radius: var(--radius);
        margin-bottom: 2rem;
        box-shadow: var(--shadow);
      }
      .not-found h1 {
        font-size: clamp(2rem, 8vw, 4rem);
        margin: 0 0 0.5rem;
        color: var(--brand);
      }
      .not-found p {
        font-size: 1.15rem;
        color: rgba(255, 255, 255, 0.88);
        max-width: 28rem;
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <div class="not-found">
      <img class="not-found-image" src="/assets/media/home-contact.jpg" alt="404 page not found - Cessnock Motor Cycle Club">
      <h1>Page not found</h1>
      <p>The page you are looking for does not exist or may have been moved.</p>
      <a class="button" href="/">Return to the homepage</a>
    </div>
  </body>
</html>
