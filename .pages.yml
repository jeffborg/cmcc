media:
  - name: media
    label: Site media
    input: assets/media
    output: /assets/media
    categories: [image, document]
  - name: legacy
    label: Legacy sweep
    input: assets/legacy-sweep
    output: /assets/legacy-sweep
    categories: [image, document]
  - name: docs
    label: Documents
    input: assets/docs
    output: /assets/docs
    categories: [document]

content:
  - name: news
    label: News
    type: collection
    path: content/news
    format: yaml-frontmatter
    filename: "{slug}.md"
    view:
      fields: [title, date, published]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use lowercase letters, numbers, and hyphens only."
      - name: date
        label: Publish date
        type: date
        required: true
      - name: published
        label: Published
        type: boolean
        default: true
      - name: summary
        label: Summary
        type: text
        required: true
      - name: featured_image
        label: Featured image
        type: image
      - name: body
        label: Article body
        type: rich-text

  - name: events
    label: Events
    type: collection
    path: content/events
    format: yaml-frontmatter
    filename: "{slug}.md"
    view:
      fields: [title, start_date, location, published]
      primary: title
      sort: [start_date, title]
      default:
        sort: start_date
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Use lowercase letters, numbers, and hyphens only."
      - name: start_date
        label: Start date
        type: date
        required: true
      - name: end_date
        label: End date
        type: date
      - name: location
        label: Location
        type: string
      - name: published
        label: Published
        type: boolean
        default: true
      - name: summary
        label: Summary
        type: text
        required: true
      - name: featured_image
        label: Featured image
        type: image
      - name: body
        label: Event details
        type: rich-text

settings:
  content:
    merge: false
